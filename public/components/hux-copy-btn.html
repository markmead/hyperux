<button
  type="button"
  x-data="huxCopy(copyConfig)"
  x-on:click="copyToClipboard()"
  class="inline-flex items-center gap-2 rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium transition-colors hover:bg-gray-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
>
  <span aria-live="polite" x-text="hasCopied ? 'Copied!' : (copyConfig.copyLabel ?? 'Copy')"></span>
</button>
